version: 2
project_name: dtiam

before:
  hooks:
    - go mod tidy
    - go generate ./...

builds:
  - main: ./cmd/dtiam
    binary: dtiam
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w
      - -X github.com/jtimothystewart/dtiam/pkg/version.Version={{.Version}}
      - -X github.com/jtimothystewart/dtiam/pkg/version.Commit={{.Commit}}
      - -X github.com/jtimothystewart/dtiam/pkg/version.Date={{.Date}}
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64

archives:
  - format: tar.gz
    name_template: >-
      {{ .ProjectName }}_
      {{- title .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else if eq .Arch "386" }}i386
      {{- else }}{{ .Arch }}{{ end }}
    format_overrides:
      - goos: windows
        format: zip

checksum:
  name_template: 'checksums.txt'

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^chore:'
      - Merge pull request
      - Merge branch

release:
  github:
    owner: jtimothystewart
    name: dtiam
  draft: true
  prerelease: auto
  name_template: "{{.ProjectName}} v{{.Version}}"

brews:
  - repository:
      owner: jtimothystewart
      name: homebrew-tap
    directory: Formula
    homepage: https://github.com/jtimothystewart/dtiam
    description: A kubectl-style CLI for Dynatrace IAM
    license: MIT
    test: |
      system "#{bin}/dtiam", "version"
    install: |
      bin.install "dtiam"

nfpms:
  - id: packages
    package_name: dtiam
    vendor: jtimothystewart
    homepage: https://github.com/jtimothystewart/dtiam
    maintainer: Timothy Stewart
    description: A kubectl-style CLI for Dynatrace IAM
    license: MIT
    formats:
      - deb
      - rpm
    bindir: /usr/bin
