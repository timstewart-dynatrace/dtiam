<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 930 500" font-family="Inter, system-ui, sans-serif">
  <rect width="930" height="500" fill="#0F172A"/>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="10" refY="5"
            markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#64748B"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="465" y="38" text-anchor="middle" fill="#F8FAFC" font-size="22" font-weight="700">dtiam Architecture</text>
  <text x="465" y="62" text-anchor="middle" fill="#94A3B8" font-size="13">CLI flow from user input to the Dynatrace IAM platform APIs</text>

  <!-- Layer 1: CLI + Commands -->
  <rect x="40" y="85" width="850" height="70" fill="#1496FF" opacity="0.08" stroke="#1496FF" stroke-width="1.5" rx="8"/>
  <text x="465" y="108" text-anchor="middle" fill="#BFDBFE" font-size="14" font-weight="700">CLI Layer — Cobra commands and global flags</text>
  <text x="465" y="132" text-anchor="middle" fill="#94A3B8" font-size="11">get - describe - create - delete - analyze - bulk - apply - template - config    |    -c  -o  -v  --plain  --dry-run</text>

  <!-- Arrow 1 -->
  <line x1="465" y1="157" x2="465" y2="178" stroke="#64748B" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Layer 2: Resource Handlers -->
  <rect x="40" y="183" width="850" height="62" fill="#A78BFA" opacity="0.08" stroke="#A78BFA" stroke-width="1.5" rx="8"/>
  <text x="465" y="205" text-anchor="middle" fill="#DDD6FE" font-size="14" font-weight="700">Resource Handlers — BaseHandler with typed implementations</text>
  <text x="465" y="225" text-anchor="middle" fill="#94A3B8" font-size="11">groups - users - service-users - policies - bindings - boundaries - environments - subscriptions - tokens - apps - schemas</text>

  <!-- Arrow 2 -->
  <line x1="465" y1="247" x2="465" y2="266" stroke="#64748B" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Layer 3: HTTP Client + Auth -->
  <rect x="40" y="270" width="850" height="62" fill="#FFB800" opacity="0.08" stroke="#FFB800" stroke-width="1.5" rx="8"/>
  <text x="465" y="292" text-anchor="middle" fill="#FCD34D" font-size="14" font-weight="700">HTTP Client + Auth — resty retry, OAuth2 refresh, bearer token</text>
  <text x="465" y="312" text-anchor="middle" fill="#94A3B8" font-size="11">exponential backoff - 429 and 5xx retry - rate-limit handling - verbose request and response logging</text>

  <!-- Arrow 3 (fan-out) -->
  <line x1="465" y1="334" x2="465" y2="355" stroke="#64748B" stroke-width="1.5"/>
  <line x1="180" y1="355" x2="750" y2="355" stroke="#64748B" stroke-width="1.5"/>
  <line x1="180" y1="355" x2="180" y2="375" stroke="#64748B" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="465" y1="355" x2="465" y2="375" stroke="#64748B" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="750" y1="355" x2="750" y2="375" stroke="#64748B" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- API: Account Management -->
  <rect x="60" y="380" width="240" height="85" fill="#1E293B" stroke="#73BE28" rx="6"/>
  <text x="180" y="403" text-anchor="middle" fill="#86EFAC" font-size="13" font-weight="700">Account Management</text>
  <text x="180" y="422" text-anchor="middle" fill="#94A3B8" font-size="11">/iam/v1/accounts/{uuid}</text>
  <text x="180" y="438" text-anchor="middle" fill="#94A3B8" font-size="11">groups - users - service users</text>
  <text x="180" y="454" text-anchor="middle" fill="#94A3B8" font-size="11">subscriptions - tokens - limits</text>

  <!-- API: Policy Repository -->
  <rect x="345" y="380" width="240" height="85" fill="#1E293B" stroke="#1496FF" rx="6"/>
  <text x="465" y="403" text-anchor="middle" fill="#BFDBFE" font-size="13" font-weight="700">Policy Repository</text>
  <text x="465" y="422" text-anchor="middle" fill="#94A3B8" font-size="11">/iam/v1/repo/{level}/{id}</text>
  <text x="465" y="438" text-anchor="middle" fill="#94A3B8" font-size="11">policies - bindings - boundaries</text>
  <text x="465" y="454" text-anchor="middle" fill="#94A3B8" font-size="11">account - environment - global</text>

  <!-- API: Environment Config / Settings -->
  <rect x="630" y="380" width="240" height="85" fill="#1E293B" stroke="#A78BFA" rx="6"/>
  <text x="750" y="403" text-anchor="middle" fill="#DDD6FE" font-size="13" font-weight="700">Environment Config</text>
  <text x="750" y="422" text-anchor="middle" fill="#94A3B8" font-size="11">{tenant}/api/v2/settings</text>
  <text x="750" y="438" text-anchor="middle" fill="#94A3B8" font-size="11">apps - schemas</text>
  <text x="750" y="454" text-anchor="middle" fill="#94A3B8" font-size="11">Api-Token (separate auth)</text>

  <!-- Divider + footnote -->
  <line x1="40" y1="480" x2="890" y2="480" stroke="#334155" stroke-width="1"/>
  <text x="465" y="496" text-anchor="middle" fill="#64748B" font-size="10">Flow: user input to global state to command to resource handler to client to API</text>
</svg>
